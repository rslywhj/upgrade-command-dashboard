<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Time Debug</title>
</head>
<body>
    <h1>Time Parsing Debug</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        function log(msg) {
            output.innerHTML += msg + '<br>';
        }

        const testStr = "2024-01-01 10:00";
        log('测试字符串: "' + testStr + '"');
        log('');

        // 模拟 toISOLocal 的第一个分支
        const direct = new Date(testStr);
        log('new Date("2024-01-01 10:00"):');
        log('  toString: ' + direct.toString());
        log('  toISOString: ' + direct.toISOString());
        log('  getTime: ' + direct.getTime());
        log('');

        // 模拟第二个分支（带 T）
        const withT = new Date(testStr.replace(" ", "T") + ":00");
        log('new Date("2024-01-01T10:00:00"):');
        log('  toString: ' + withT.toString());
        log('  toISOString: ' + withT.toISOString());
        log('  getTime: ' + withT.getTime());
        log('');

        // 检查时区
        log('时区偏移: ' + new Date().getTimezoneOffset() + ' 分钟');
    </script>
</body>
</html>
