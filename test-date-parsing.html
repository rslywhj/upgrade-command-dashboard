<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Date Parsing Test</title>
</head>
<body>
    <h1>Date Parsing Test</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        function log(msg) {
            output.innerHTML += msg + '<br>';
            console.log(msg);
        }

        // 测试不同的日期字符串解析
        const testStr = "2024-01-01 10:00";

        log('=== 测试字符串: "' + testStr + '" ===');
        log('');

        // 方法 1: 直接 new Date (当前代码第 75 行的做法)
        const direct = new Date(testStr);
        log('方法 1 - new Date("2024-01-01 10:00"):');
        log('  结果: ' + direct.toString());
        log('  ISO: ' + direct.toISOString());
        log('  getTime: ' + direct.getTime());
        log('');

        // 方法 2: 替换空格为 T (当前代码第 88 行的做法)
        const withT = new Date(testStr.replace(" ", "T"));
        log('方法 2 - new Date("2024-01-01T10:00"):');
        log('  结果: ' + withT.toString());
        log('  ISO: ' + withT.toISOString());
        log('  getTime: ' + withT.getTime());
        log('');

        // 方法 3: 添加秒数
        const withSeconds = new Date(testStr.replace(" ", "T") + ":00");
        log('方法 3 - new Date("2024-01-01T10:00:00"):');
        log('  结果: ' + withSeconds.toString());
        log('  ISO: ' + withSeconds.toISOString());
        log('  getTime: ' + withSeconds.getTime());
        log('');

        // 时间差
        const diff1 = (withT.getTime() - direct.getTime()) / 1000;
        const diff2 = (withSeconds.getTime() - direct.getTime()) / 1000;

        log('=== 时间差 ===');
        log('方法 2 - 方法 1: ' + diff1 + ' 秒');
        log('方法 3 - 方法 1: ' + diff2 + ' 秒');
    </script>
</body>
</html>
